name: astral
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.9.0


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  http: ^1.4.0
  web_socket_channel: ^3.0.3
  file_picker: ^11.0.1
  just_audio: ^0.10.4
  mime: ^2.0.0
  logger: ^2.6.0
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.3
  fl_chart: ^1.1.0
  flutter_secure_storage: ^10.0.0
  url_launcher: ^6.2.0
  flutter_inappwebview: ^6.1.5
  connectivity_plus: ^7.1.0
  flutter_colorpicker: ^1.1.0
  record: ^6.2.0              # STT audio recording for voice input (Constitution V)
  flutter_math_fork: ^0.7.2   # LaTeX math rendering within markdown (Constitution V)
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  mockito: ^5.4.5
  build_runner: ^2.4.15


# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon" # Or true to generate for both Android and iOS
  ios: true
  image_path: "assets/icon/astral.png" # Path to your icon image
  adaptive_icon_background: "#FFFFFF" # Background color or image path
  adaptive_icon_foreground: "assets/icon/astral.png" # Foreground image path
